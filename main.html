<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Caesar Cipher - Forward & Backward</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b, #4b5563);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
      color: #e5e7eb;
    }

    .card {
      background: rgba(15, 23, 42, 0.95);
      border-radius: 16px;
      padding: 24px 20px;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(148, 163, 184, 0.35);
      backdrop-filter: blur(8px);
    }

    .title {
      text-align: center;
      font-size: 1.4rem;
      margin-bottom: 4px;
    }

    .subtitle {
      text-align: center;
      font-size: 0.85rem;
      color: #9ca3af;
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 0.85rem;
      margin: 10px 0 4px;
      color: #cbd5f5;
    }

    textarea,
    input,
    select {
      width: 100%;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid #4b5563;
      background: #020617;
      color: #e5e7eb;
      outline: none;
      font-size: 0.95rem;
    }

    textarea {
      resize: vertical;
      min-height: 70px;
      max-height: 150px;
    }

    textarea:focus,
    input:focus,
    select:focus {
      border-color: #6366f1;
      box-shadow: 0 0 0 1px #6366f1;
    }

    .row {
      display: flex;
      gap: 8px;
      margin-top: 6px;
      flex-wrap: wrap;
    }

    .row .field {
      flex: 1 1 120px;
    }

    button {
      margin-top: 14px;
      width: 100%;
      padding: 10px;
      border-radius: 999px;
      border: none;
      font-size: 0.98rem;
      font-weight: 600;
      cursor: pointer;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: white;
      transition: transform 0.08s ease, box-shadow 0.08s ease, opacity 0.1s ease;
      box-shadow: 0 10px 20px rgba(79, 70, 229, 0.45);
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 14px 28px rgba(79, 70, 229, 0.6);
    }

    button:active {
      transform: translateY(0);
      box-shadow: 0 8px 18px rgba(79, 70, 229, 0.5);
      opacity: 0.9;
    }

    .result-box {
      margin-top: 16px;
      padding: 12px;
      border-radius: 10px;
      background: #020617;
      border: 1px solid #4b5563;
      font-size: 0.95rem;
      position: relative;
    }

    .result-label {
      font-size: 0.8rem;
      color: #9ca3af;
      margin-bottom: 4px;
    }

    .result-text {
      word-wrap: break-word;
      white-space: pre-wrap;
    }

    .copy-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      font-size: 0.75rem;
      padding: 4px 8px;
      width: auto;
      box-shadow: none;
      background: #111827;
    }

    .footer-note {
      margin-top: 10px;
      font-size: 0.75rem;
      text-align: center;
      color: #9ca3af;
    }

    @media (max-width: 480px) {
      .card {
        padding: 18px 14px;
      }

      .title {
        font-size: 1.2rem;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1 class="title">Caesar Cipher</h1>
    <p class="subtitle">Forward = encrypt · Backward = decrypt</p>

    <label for="text">Text</label>
    <textarea id="text" placeholder="Enter your message here..."></textarea>

    <div class="row">
      <div class="field">
        <label for="shift">Shift</label>
        <input type="number" id="shift" placeholder="e.g. 3">
      </div>
      <div class="field">
        <label for="mode">Mode</label>
        <select id="mode">
          <option value="forward">Forward (Encrypt)</option>
          <option value="backward">Backward (Decrypt)</option>
        </select>
      </div>
    </div>

    <button onclick="runCipher()">Show Result</button>

    <div class="result-box" id="resultBox" style="display:none;">
      <button class="copy-btn" onclick="copyResult()">Copy</button>
      <div class="result-label">Result</div>
      <div class="result-text" id="resultText"></div>
    </div>
  <script>
    function caesarCipher(text, shift, mode) {
      if (mode === "backward") {
        shift = -shift;
      }

      let result = "";

      for (let i = 0; i < text.length; i++) {
        let char = text[i];

        if (/[A-Za-z]/.test(char)) {
          let asciiStart = (char === char.toUpperCase()) ? 65 : 97;
          let code = char.charCodeAt(0) - asciiStart;

          // Proper modulo for negatives
          let shifted = ((code + shift) % 26 + 26) % 26;

          result += String.fromCharCode(shifted + asciiStart);
        } else {
          result += char;
        }
      }

      return result;
    }

    function runCipher() {
      const text = document.getElementById("text").value;
      const shiftInput = document.getElementById("shift").value;
      const mode = document.getElementById("mode").value;
      const resultBox = document.getElementById("resultBox");
      const resultText = document.getElementById("resultText");

      if (shiftInput.trim() === "") {
        alert("Please enter a shift value.");
        return;
      }

      const shift = parseInt(shiftInput, 10);

      if (isNaN(shift)) {
        alert("Shift must be a number.");
        return;
      }

      const output = caesarCipher(text, shift, mode);
      resultText.textContent = output;
      resultBox.style.display = "block";
    }

    function copyResult() {
      const text = document.getElementById("resultText").textContent;
      if (!text) return;

      navigator.clipboard.writeText(text)
        .then(() => {
          const btn = document.querySelector(".copy-btn");
          const oldText = btn.textContent;
          btn.textContent = "Copied!";
          setTimeout(() => {
            btn.textContent = oldText;
          }, 1000);
        })
        .catch(() => {
          alert("Could not copy. Please copy manually.");
        });
    }
  </script>
</body>
</html>
